<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .body { fill: #f7e7a1; stroke: #a88638; stroke-width: 3; }
      .beak { fill: #ff9900; stroke: #cc7a00; stroke-width: 2; }
      .wing { fill: #b0a070; stroke: #8b7553; stroke-width: 2; }
      .bike-frame { stroke: #333333; stroke-width: 6; fill: none; }
      .tire { stroke: #333333; stroke-width: 4; fill: #111111; }
      .wheel-spoke { stroke: #666666; stroke-width: 1; }
      .leg { stroke: #a0522d; stroke-width: 4; fill: none; }
    </style>
  </defs>

  <!-- Ground Line -->
  <line x1="0" y1="350" x2="600" y2="350" stroke="#555555" stroke-width="2"/>

  <!-- ========================
       1. THE PELICAN
       ======================== -->

  <!-- Body (Simplified oval shape) -->
  <ellipse cx="280" cy="250" rx="60" ry="40" class="body"/>

  <!-- Head -->
  <circle cx="240" cy="220" r="30" class="body"/>

  <!-- Neck (Connecting head to body) -->
  <path d="M 240 220 Q 200 180, 220 170" stroke="#a88638" stroke-width="5" fill="none"/>

  <!-- Beak (Large, stylized) -->
  <path d="M 250 200 L 340 185 L 340 210 Z" class="beak"/>

  <!-- Pouch (Simplified pouch area) -->
  <path d="M 300 210 Q 330 225, 300 235" fill="#f7e7a1" stroke="#a88638" stroke-width="2"/>

  <!-- Wings (Simplified flaps) -->
  <path d="M 200 230 C 170 200, 150 250, 210 280 Z" class="wing"/>
  <path d="M 280 230 C 310 200, 330 250, 270 280 Z" class="wing"/>


  <!-- Legs and Feet (Pedaling position) -->
  <!-- Left Leg (Pedaling down) -->
  <path d="M 260 290 L 240 340 L 255 340 Z" class="leg"/>
  <!-- Right Leg (Pedaling up) -->
  <path d="M 300 290 L 320 330 L 335 330 Z" class="leg"/>
  
  <!-- ========================
       2. THE BICYCLE
       ======================== -->

  <!-- Wheel 1 (Front) -->
  <circle cx="350" cy="330" r="45" class="tire"/>
  <g transform="translate(350, 330)">
    <!-- Spokes -->
    <line x1="0" y1="-45" x2="0" y2="45" class="wheel-spoke"/>
    <line x1="-45" y1="0" x2="45" y2="0" class="wheel-spoke"/>
    <line x1="10" y1="-30" x2="10" y2="30" class="wheel-spoke"/>
    <line x1="-10" y1="-30" x2="-10" y2="30" class="wheel-spoke"/>
  </g>

  <!-- Wheel 2 (Back) -->
  <circle cx="200" cy="330" r="45" class="tire"/>
  <g transform="translate(200, 330)">
    <!-- Spokes -->
    <line x1="0" y1="-45" x2="0" y2="45" class="wheel-spoke"/>
    <line x1="-45" y1="0" x2="45" y2="0" class="wheel-spoke"/>
    <line x1="10" y1="-30" x2="10" y2="30" class="wheel-spoke"/>
    <line x1="-10" y1="-30" x2="-10" y2="30" class="wheel-spoke"/>
  </g>

  <!-- Frame (Simplistic diamond shape) -->
  <line x1="200" y1="330" x2="350" y2="330" class="bike-frame"/> <!-- Bottom bar -->
  <line x1="200" y1="330" x2="280" y2="180" class="bike-frame"/> <!-- Seat tube -->
  <line x1="350" y1="330" x2="310" y2="180" class="bike-frame"/> <!-- Head tube connection -->
  <!-- Connecting bar to the front wheel axle area -->
  <line x1="280" y1="180" x2="310" y2="180" class="bike-frame"/> 

</svg>

