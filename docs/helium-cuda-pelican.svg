<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Simple shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#e0f7fa"/>

  <!-- Ground Line -->
  <line x1="0" y1="350" x2="500" y2="350" stroke="#81d4fa" stroke-width="4" stroke-linecap="round"/>

  <!-- BIKE GROUP -->
  <g id="bicycle" transform="translate(50, 50)">
    <!-- Back Wheel -->
    <circle cx="100" cy="250" r="50" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="100" cy="250" r="35" fill="none" stroke="#ccc" stroke-width="2"/>
    <line x1="100" y1="200" x2="100" y2="300" stroke="#999" stroke-width="2"/>
    <line x1="50" y1="250" x2="150" y2="250" stroke="#999" stroke-width="2"/>

    <!-- Front Wheel -->
    <circle cx="300" cy="250" r="50" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="300" cy="250" r="35" fill="none" stroke="#ccc" stroke-width="2"/>
    <line x1="300" y1="200" x2="300" y2="300" stroke="#999" stroke-width="2"/>
    <line x1="250" y1="250" x2="350" y2="250" stroke="#999" stroke-width="2"/>

    <!-- Frame -->
    <path d="M100 250 L 200 180 L 300 250" fill="none" stroke="#d32f2f" stroke-width="6" stroke-linejoin="round"/>
    <path d="M200 180 L 230 180 L 140 250" fill="none" stroke="#d32f2f" stroke-width="6" stroke-linejoin="round"/>
    <path d="M200 180 L 200 130" fill="none" stroke="#d32f2f" stroke-width="6"/>
    <path d="M190 130 L 210 130" fill="none" stroke="#333" stroke-width="5"/>

    <!-- Pedals & Crank -->
    <circle cx="140" cy="250" r="10" fill="#555"/>
    <line x1="140" y1="250" x2="150" y2="270" stroke="#555" stroke-width="4"/>
    <rect x="145" y="265" width="20" height="5" fill="#333" transform="rotate(-10 155 265)"/>

    <!-- Seat -->
    <path d="M190 125 L 210 125" stroke="#333" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- PELICAN GROUP -->
  <g id="pelican" transform="translate(50, 50)" filter="url(#shadow)">

    <!-- Tail Feathers -->
    <path d="M180 140 L 130 150 L 160 170 Z" fill="#fff" stroke="#ddd" stroke-width="1"/>

    <!-- Body -->
    <ellipse cx="180" cy="150" rx="45" ry="35" fill="#fff" stroke="#ddd" stroke-width="1"/>

    <!-- Neck -->
    <path d="M210 140 Q 240 140 245 100" fill="none" stroke="#fff" stroke-width="18"/>
    <path d="M210 140 Q 240 140 245 100" fill="none" stroke="#ddd" stroke-width="1"/> <!-- Outline -->

    <!-- Head -->
    <circle cx="245" cy="100" r="15" fill="#fff" stroke="#ddd" stroke-width="1"/>

    <!-- Eye -->
    <circle cx="250" cy="95" r="3" fill="#000"/>
    <circle cx="251" cy="94" r="1" fill="#fff"/>

    <!-- Beak (Top) -->
    <path d="M255 95 L 315 100 L 255 103 Z" fill="#ffa726" stroke="#e65100" stroke-width="1"/>

    <!-- Pouch (Bottom of beak) -->
    <path d="M260 103 Q 285 135 310 100 Z" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>

    <!-- Wing (Flapping slightly back) -->
    <path d="M170 140 Q 150 110 130 115 Q 150 140 180 150 Z" fill="#eee" stroke="#ccc" stroke-width="1"/>

    <!-- Legs -->
    <!-- Leg 1 (Down to pedal) -->
    <line x1="180" y1="170" x2="150" y2="270" stroke="#ffa726" stroke-width="5" stroke-linecap="round"/>
    <!-- Foot 1 -->
    <path d="M145 270 L 155 270" stroke="#e65100" stroke-width="3"/>

    <!-- Leg 2 (Up) -->
    <line x1="190" y1="170" x2="130" y2="230" stroke="#ffa726" stroke-width="5" stroke-linecap="round"/>
    <!-- Foot 2 -->
    <path d="M125 225 L 135 225" stroke="#e65100" stroke-width="3"/>

    <!-- Arms -->
    <path d="M200 140 Q 220 170 225 130" fill="none" stroke="#ffa726" stroke-width="4" stroke-linecap="round"/>
    <!-- Hands -->
    <circle cx="225" cy="130" r="4" fill="#ffa726"/>
  </g>

</svg>
